<!DOCTYPE>
<html lang="id">
<head>
	<title>Form Pendataaran Siswa</title>

</head>
<body>
	<h1>Form Pendaftaran Siswa</h1>
	<p>silahkan isi data di bawah ini</p>
	

<form>
	<label>Nama  Lengkap:</label><br>
	<input type="text" placeholder="masukan nama"><br>
	<label>Jenis Kelamin:</label><br>
	<input type="radio" name="jk"><label>laki-laki</label>
	<input type="radio" name="jk"><label>perempuan</label><br>
	<label>Email:</label><br>
	<input type="Email"placeholder="masukan email"><br>
	<label>No.HP :</label><br>
	<input type="Number" placeholder="08xxxxxxxxx"><br>
	<label>Jurusan :</label><br>
<select>
	<option>TKJ</option>
	<option>RPL</option>
	<option>OTOMOTIF</option>

</select>
<br>
	<label>Alamat:</label><br>
	<input type="text area" placeholder="masukan alamat"><br>
	<label>kota/kabupaten:</label><br>
	<input type="text" placeholder="masukan nama kota/kabupaten"><br>
 
	<input type="submit" value="kirim"


</form>
</body>
</html>
